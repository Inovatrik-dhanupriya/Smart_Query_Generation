<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400" role="img" aria-labelledby="t">
  <title id="t">Data and analytics illustration</title>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.35"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
    </filter>
  </defs>
  <!-- Soft backdrop shapes -->
  <circle cx="420" cy="80" r="64" fill="url(#g1)" opacity="0.5"/>
  <circle cx="90" cy="300" r="48" fill="#ffffff" opacity="0.08"/>
  <rect x="320" y="220" width="120" height="8" rx="4" fill="#fff" opacity="0.2"/>
  <rect x="340" y="240" width="80" height="6" rx="3" fill="#fff" opacity="0.12"/>
  <!-- Monitor -->
  <rect x="120" y="100" width="220" height="150" rx="10" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
  <rect x="132" y="112" width="196" height="110" rx="4" fill="#0f172a"/>
  <!-- SQL / chart in screen -->
  <path d="M150 150 L190 150 M150 170 L200 170 M150 190 L180 190" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <rect x="220" y="140" width="50" height="30" fill="#6366f1" opacity="0.6" rx="2"/>
  <rect x="280" y="150" width="10" height="20" fill="#a78bfa" rx="1"/>
  <rect x="295" y="145" width="10" height="25" fill="#a78bfa" rx="1"/>
  <rect x="310" y="135" width="10" height="35" fill="#a78bfa" rx="1"/>
  <circle cx="270" cy="200" r="16" fill="none" stroke="#f472b6" stroke-width="2"/>
  <path d="M270 200 L280 195" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="200" y="250" width="60" height="20" rx="3" fill="#4c1d95"/>
  <rect x="175" y="270" width="110" height="8" rx="2" fill="#5b21b6"/>
  <!-- Person (abstract) -->
  <ellipse cx="360" cy="200" rx="22" fill="#fbbf24" opacity="0.95"/>
  <rect x="345" y="220" width="30" height="45" rx="6" fill="#7c3aed"/>
  <path d="M330 255 Q360 240 390 255" stroke="#c4b5fd" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Floating icons -->
  <g stroke="#e9d5ff" stroke-width="1.5" fill="none" opacity="0.7">
    <rect x="40" y="60" width="24" height="20" rx="2"/>
    <path d="M50 100 L58 110 L70 100"/>
    <circle cx="420" cy="200" r="12"/>
    <path d="M415 200 L420 205 L430 195"/>
  </g>
  <g fill="#fff" opacity="0.25" filter="url(#s)">
    <rect x="60" y="180" width="6" height="6" transform="rotate(20 63 183)"/>
    <rect x="430" y="120" width="5" height="5" transform="rotate(-12 432 122)"/>
  </g>
  <!-- Check badge -->
  <circle cx="100" cy="200" r="20" fill="#22c55e" opacity="0.9"/>
  <path d="M90 200 L98 208 L115 191" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
